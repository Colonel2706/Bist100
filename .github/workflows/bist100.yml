name: BIST100 Günlük Tarama

on:
  schedule:
    - cron: "0 5 * * 1-5"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tara-ve-gonder:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install yfinance pandas numpy

      - name: Scripti çalıştır
        env:
          EMAIL_GONDEREN: ${{ secrets.EMAIL_GONDEREN }}
          EMAIL_SIFRE:    ${{ secrets.EMAIL_SIFRE }}
          EMAIL_ALICI:    ${{ secrets.EMAIL_ALICI }}
        run: python bist100_screener.py
